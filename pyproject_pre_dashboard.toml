[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pleiades-thermal-twin"
version = "0.1.0"
description = "Reproducible RC thermal-model workflow for PLEIAData"
requires-python = ">=3.12"
dependencies = ["numpy", "pandas", "scipy"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra"
